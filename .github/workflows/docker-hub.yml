name: Docker Hub - Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven Tests
        run: mvn clean test

  build-and-release:
    name: Build, Push & Release
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Export Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: sharmaxz/cs425-swe-2026-final:${{ github.ref_name }}

      - name: Compress Docker Image
        run: docker save sharmaxz/cs425-swe-2026-final:${{ github.ref_name }} | gzip > cs425-swe-2026-final-docker.tar.gz

      - name: Push Docker Image to Hub
        run: docker push sharmaxz/cs425-swe-2026-final:${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: cs425-swe-2026-final-docker.tar.gz
